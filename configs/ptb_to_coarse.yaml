  NNP: NOUN
  NNPS: NOUN
  NNS: NOUN
  VB: VERB
  VBD: VERB
  VBG: VERB
  VBN: VERB
  VBP: VERB
  VBZ: VERB
  VERB: VERB
  MD: VERB
  JJ: ADJ
  JJR: ADJ
  JJS: ADJ
  RB: ADV
  RBR: ADV
  RBS: ADV
  WRB: ADV
  IN: PREP
  DT: DET
  WDT: DET
  PDT: DET
  CD: DET
  PRP: PRON
  "PRP$": PRON
  WP: PRON
  "WP$": PRON
  EX: PRON
  CC: CONJ
  TO: PART
  RP: PART
  POS: PART
  UH: INT
  XX: UNK
  UNK: UNK
  "``": PUNCT
  "''": PUNCT
  ",": PUNCT
  "-LRB-": PUNCT
  "-RRB-": PUNCT
  ".": PUNCT
