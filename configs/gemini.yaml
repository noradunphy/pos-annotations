# Gemini API tagger configuration
# Set GEMINI_API_KEY in the environment before running.

flash_model: gemini-2.5-flash
frontier_model: gemini-2.5-pro

temperature: 0.1
max_output_tokens: 4096   # must cover thinking tokens + response (gemini-2.5-pro requires thinking mode)
thinking_budget: -1       # -1 = model decides; gemini-2.5-pro does not allow budget=0
